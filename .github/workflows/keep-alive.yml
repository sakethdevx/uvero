name: Keep HuggingFace Compiler Warm

on:
  schedule:
    # Run every 2 hours (e.g. 0:00, 2:00, 4:00, etc. UTC) to keep the HuggingFace instance warm
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Uvero Compiler Keep-Alive Endpoint
        run: |
          echo "Pinging Uvero keep-alive endpoint..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://uvero.app/api/compiler/keep-alive)
          echo "Response status code: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Warning: Received HTTP $STATUS_CODE. HuggingFace instance might be waking up or having issues."
          else
            echo "Success: Keep-alive ping completed successfully."
          fi
