name: File Tools

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  validate-file-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check File Tools Consistency
        run: npm run check:file-tools

      - name: Smoke Test Representative File Tool Routes
        run: npm run test:file-tools-routes

      - name: Test RAR to ZIP API Error Handling
        run: npm run test:rar-to-zip

      - name: Build
        run: npm run build
